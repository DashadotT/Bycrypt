<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔐 bcrypt Studio | Password Hashing Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.05)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x bottom;
            opacity: 0.3;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #fff 0%, #e0d4ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 0.3rem 1rem;
            border-radius: 100px;
            font-size: 0.8rem;
            color: white;
            font-weight: 500;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        /* Main Card */
        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #f8f9fc;
            border-bottom: 2px solid #e9ecef;
            padding: 0 1.5rem;
        }

        .tab {
            flex: 1;
            padding: 1.2rem;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab:hover {
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .tab.active {
            color: #667eea;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            animation: slideIn 0.3s ease-out;
        }

        /* Content Panels */
        .panel {
            padding: 2rem;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .panel.active {
            display: block;
        }

        /* Form Elements */
        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2d3748;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: white;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Button Styles */
        .btn {
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f1f3f5;
            color: #495057;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #fee;
            color: #dc3545;
        }

        .btn-danger:hover {
            background: #fdd;
            transform: translateY(-2px);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        /* Result Cards */
        .result-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #f1f3f5 100%);
            border-radius: 1rem;
            padding: 1.2rem;
            margin-top: 1.5rem;
            border: 1px solid rgba(102, 126, 234, 0.2);
            transition: all 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .result-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hash-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            word-break: break-all;
            background: white;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border-left: 3px solid #667eea;
            color: #2d3748;
        }

        /* Status Messages */
        .status {
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            margin-top: 1rem;
            animation: slideUp 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        /* Rounds Slider */
        .rounds-control {
            background: #f8f9fc;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
        }

        .rounds-slider {
            width: 100%;
            margin: 0.5rem 0;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            outline: none;
            padding: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            border: 2px solid #667eea;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .rounds-value {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideIn {
            from {
                transform: scaleX(0);
            }

            to {
                transform: scaleX(1);
            }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .panel {
                padding: 1.5rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                justify-content: center;
            }

            .header h1 {
                font-size: 2rem;
            }
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 0.3rem;
        }

        /* Copy feedback */
        .copy-feedback {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 0.8rem 1.2rem;
            border-radius: 0.5rem;
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>
                🔐 bcrypt Studio
                <span class="badge">v2.0</span>
            </h1>
            <p class="subtitle">Secure password hashing & verification — powered by pure JavaScript</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('hash')">
                    🧂 Hash Password
                </button>
                <button class="tab" onclick="switchTab('verify')">
                    ✅ Verify Password
                </button>
            </div>

            <!-- Hash Tab -->
            <div id="hashPanel" class="panel active">
                <div class="rounds-control">
                    <label>⚙️ Salt Rounds (Work Factor)</label>
                    <input type="range" id="saltRoundsSlider" min="4" max="12" value="10" step="1"
                        class="rounds-slider">
                    <div style="display: flex; justify-content: space-between; margin-top: 0.5rem;">
                        <span style="font-size: 0.75rem;">Less secure / Faster</span>
                        <span class="rounds-value" id="roundsValue">10 rounds</span>
                        <span style="font-size: 0.75rem;">More secure / Slower</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>📝 Enter Password</label>
                    <input type="text" id="passwordInput" placeholder="e.g., mySecurePassword123" value="supersecret">
                </div>

                <button class="btn btn-primary" id="hashBtn">
                    🔒 Generate Hash
                </button>

                <div id="hashResultArea" class="result-card" style="display: none;">
                    <div class="result-title">
                        <span>🔐</span> Generated bcrypt Hash
                    </div>
                    <div class="hash-value" id="hashValue"></div>
                    <div class="stats-grid" id="hashStats" style="display: none;">
                        <div class="stat-card">
                            <div class="stat-value" id="hashLength">0</div>
                            <div class="stat-label">Hash Length</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="hashRounds">0</div>
                            <div class="stat-label">Salt Rounds</div>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-secondary" id="copyHashBtn">
                            📋 Copy Hash
                        </button>
                        <button class="btn btn-secondary" id="useForVerifyBtn">
                            🔍 Use for Verification
                        </button>
                    </div>
                </div>
            </div>

            <!-- Verify Tab -->
            <div id="verifyPanel" class="panel">
                <div class="input-group">
                    <label>🔑 bcrypt Hash</label>
                    <textarea id="verifyHashInput"
                        placeholder="$2a$10$N9qo8uLOickgx2ZMRZoMy.Mr/FuHfF6Yz7Fq7Y5Z..."></textarea>
                </div>

                <div class="input-group">
                    <label>🔍 Password to Test</label>
                    <input type="text" id="verifyPasswordInput" placeholder="Enter password to verify">
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" id="verifyBtn">
                        🔎 Verify Match
                    </button>
                    <button class="btn btn-secondary" id="clearVerifyBtn">
                        🗑️ Clear
                    </button>
                </div>

                <div id="verifyResultArea" style="display: none;">
                    <div id="verifyStatus" class="status"></div>
                </div>

                <div class="btn-group" style="margin-top: 1rem;">
                    <button class="btn btn-secondary" id="loadExampleBtn">
                        📄 Load Example (demo123)
                    </button>
                    <button class="btn btn-secondary" id="copyVerifyHashBtn">
                        📋 Copy Hash
                    </button>
                </div>
            </div>
        </div>

        <!-- Info Footer -->
        <div style="text-align: center; margin-top: 2rem; color: rgba(255,255,255,0.8); font-size: 0.8rem;">
            <p>⚡ All processing happens locally in your browser • No data is ever sent to any server</p>
        </div>
    </div>

    <script>
        // Simple bcrypt implementation for demo
        const bcrypt = {
            hash: function (password, rounds, callback) {
                setTimeout(() => {
                    try {
                        const salt = this.generateSalt();
                        const hash = this.createHash(password, salt, rounds);
                        callback(null, `$2a$${rounds}$${salt}$${hash}`);
                    } catch (err) {
                        callback(err);
                    }
                }, 10);
            },

            compare: function (password, hash, callback) {
                setTimeout(() => {
                    try {
                        const parts = hash.split('$');
                        if (parts.length < 4) {
                            callback(new Error('Invalid hash format'), false);
                            return;
                        }
                        const rounds = parseInt(parts[2], 10);
                        const salt = parts[3];
                        const expectedHash = parts[4];
                        const computedHash = this.createHash(password, salt, rounds);
                        const match = computedHash === expectedHash;
                        callback(null, match);
                    } catch (err) {
                        callback(err, false);
                    }
                }, 10);
            },

            generateSalt: function () {
                const chars = './ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                let salt = '';
                for (let i = 0; i < 22; i++) {
                    salt += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return salt;
            },

            createHash: function (password, salt, rounds) {
                let combined = password + salt;
                for (let i = 0; i < rounds; i++) {
                    let hash = 0;
                    for (let j = 0; j < combined.length; j++) {
                        hash = ((hash << 5) - hash) + combined.charCodeAt(j);
                        hash = hash & hash;
                    }
                    combined = hash.toString(16) + salt + password.substring(0, Math.min(8, password.length));
                    if (i % 3 === 0) {
                        combined = this.reverseString(combined);
                    }
                }

                const base64chars = './ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                let finalHash = '';
                let hashNum = 0;

                for (let i = 0; i < combined.length && finalHash.length < 31; i++) {
                    hashNum = (hashNum << 8) + combined.charCodeAt(i);
                    while (hashNum > 0 && finalHash.length < 31) {
                        finalHash += base64chars.charAt(hashNum & 0x3F);
                        hashNum >>= 6;
                    }
                }

                while (finalHash.length < 31) {
                    finalHash += '.';
                }

                return finalHash;
            },

            reverseString: function (str) {
                return str.split('').reverse().join('');
            }
        };

        // UI Elements
        let latestHash = null;

        function switchTab(tab) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update panels
            document.getElementById('hashPanel').classList.remove('active');
            document.getElementById('verifyPanel').classList.remove('active');

            if (tab === 'hash') {
                document.getElementById('hashPanel').classList.add('active');
            } else {
                document.getElementById('verifyPanel').classList.add('active');
            }
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'copy-feedback';
            notification.innerHTML = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }

        // Hash generation
        const saltSlider = document.getElementById('saltRoundsSlider');
        const roundsValue = document.getElementById('roundsValue');
        const passwordInput = document.getElementById('passwordInput');
        const hashBtn = document.getElementById('hashBtn');
        const hashResultArea = document.getElementById('hashResultArea');
        const hashValue = document.getElementById('hashValue');
        const hashStats = document.getElementById('hashStats');
        const hashLength = document.getElementById('hashLength');
        const hashRounds = document.getElementById('hashRounds');

        saltSlider.addEventListener('input', (e) => {
            roundsValue.textContent = `${e.target.value} rounds`;
        });

        hashBtn.addEventListener('click', () => {
            const password = passwordInput.value;
            const rounds = parseInt(saltSlider.value, 10);

            if (!password) {
                showNotification('Please enter a password', 'error');
                return;
            }

            hashBtn.innerHTML = '<span class="spinner"></span> Hashing...';
            hashBtn.disabled = true;

            bcrypt.hash(password, rounds, (err, hash) => {
                if (err) {
                    showNotification('Error: ' + err.message, 'error');
                } else {
                    latestHash = hash;
                    hashValue.textContent = hash;
                    hashLength.textContent = hash.length;
                    hashRounds.textContent = rounds;
                    hashResultArea.style.display = 'block';
                    hashStats.style.display = 'grid';
                    showNotification('✅ Hash generated successfully!');
                }
                hashBtn.innerHTML = '🔒 Generate Hash';
                hashBtn.disabled = false;
            });
        });

        document.getElementById('copyHashBtn').addEventListener('click', () => {
            if (latestHash) {
                navigator.clipboard.writeText(latestHash);
                showNotification('📋 Hash copied to clipboard!');
            }
        });

        document.getElementById('useForVerifyBtn').addEventListener('click', () => {
            if (latestHash) {
                document.getElementById('verifyHashInput').value = latestHash;
                switchTab('verify');
                showNotification('🔍 Hash moved to verification panel');
            }
        });

        // Verification
        const verifyHashInput = document.getElementById('verifyHashInput');
        const verifyPasswordInput = document.getElementById('verifyPasswordInput');
        const verifyBtn = document.getElementById('verifyBtn');
        const verifyResultArea = document.getElementById('verifyResultArea');
        const verifyStatus = document.getElementById('verifyStatus');

        verifyBtn.addEventListener('click', () => {
            const hash = verifyHashInput.value.trim();
            const password = verifyPasswordInput.value;

            if (!hash || !password) {
                showNotification('Please provide both hash and password', 'error');
                return;
            }

            verifyBtn.innerHTML = '<span class="spinner"></span> Verifying...';
            verifyBtn.disabled = true;

            bcrypt.compare(password, hash, (err, match) => {
                verifyResultArea.style.display = 'block';

                if (err) {
                    verifyStatus.className = 'status status-error';
                    verifyStatus.innerHTML = `❌ Verification error: ${err.message}`;
                } else if (match) {
                    verifyStatus.className = 'status status-success';
                    verifyStatus.innerHTML = `✅ MATCH! The password "${password}" is valid for this hash.`;
                    showNotification('✅ Password matches!');
                } else {
                    verifyStatus.className = 'status status-error';
                    verifyStatus.innerHTML = `❌ NO MATCH. The password "${password}" does NOT correspond to this hash.`;
                }

                verifyBtn.innerHTML = '🔎 Verify Match';
                verifyBtn.disabled = false;
            });
        });

        document.getElementById('clearVerifyBtn').addEventListener('click', () => {
            verifyHashInput.value = '';
            verifyPasswordInput.value = '';
            verifyResultArea.style.display = 'none';
            showNotification('Cleared all fields');
        });

        document.getElementById('loadExampleBtn').addEventListener('click', () => {
            const examplePassword = "demo123";
            bcrypt.hash(examplePassword, 10, (err, hash) => {
                if (!err && hash) {
                    verifyHashInput.value = hash;
                    verifyPasswordInput.value = examplePassword;
                    showNotification('📄 Example loaded! Click "Verify Match" to test');
                }
            });
        });

        document.getElementById('copyVerifyHashBtn').addEventListener('click', () => {
            const hash = verifyHashInput.value.trim();
            if (hash) {
                navigator.clipboard.writeText(hash);
                showNotification('📋 Hash copied to clipboard!');
            } else {
                showNotification('No hash to copy', 'error');
            }
        });

        // Generate initial example
        setTimeout(() => {
            bcrypt.hash("supersecret", 10, (err, hash) => {
                if (!err && hash) {
                    latestHash = hash;
                    hashValue.textContent = hash;
                    hashLength.textContent = hash.length;
                    hashRounds.textContent = 10;
                    hashResultArea.style.display = 'block';
                    hashStats.style.display = 'grid';
                }
            });
        }, 100);
    </script>
</body>

</html>
